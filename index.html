<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&family=Inter:wght@400;600&family=Merriweather:wght@400&display=swap" rel="stylesheet">

<style>

:root{
--bg:#ffffff;
--text:#000000;
--border:#000000;
--hover:rgba(0,0,0,0.06);
}

[data-theme="dark"]{
--bg:#000000;
--text:#ffffff;
--border:#ffffff;
--hover:rgba(255,255,255,0.1);
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:'Inter',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
transition:0.25s;
}

.container{
width:92%;
max-width:640px;
text-align:center;
}

h1{
font-family:'Poppins',sans-serif;
font-weight:700;
font-size:48px;
margin-bottom:30px;
}

.question{
font-family:'Poppins',sans-serif;
font-size:28px;
margin-bottom:35px;
min-height:40px;
}

.score{
border:2px solid var(--border);
display:inline-block;
padding:6px 22px;
border-radius:20px;
margin-bottom:25px;
font-weight:600;
}

.options{
display:grid;
gap:14px;
}

.option{
border:1px solid var(--border);
background:none;
padding:14px;
border-radius:28px;
font-family:'Inter',sans-serif;
font-size:18px;
cursor:pointer;
color:var(--text);
}

.option:hover{
background:var(--hover);
opacity:.8;
}

.nav{
margin-top:35px;
display:flex;
justify-content:center;
gap:18px;
}

.nav button{
width:46px;
height:46px;
border-radius:50%;
border:1px solid var(--border);
background:none;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
color:var(--text);
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid var(--border);
background:none;
color:var(--text);
font-family:'Inter',sans-serif;
}

.start{
margin-top:15px;
padding:12px 30px;
font-family:'Inter',sans-serif;
font-weight:600;
border:none;
border-radius:10px;
background:var(--text);
color:var(--bg);
cursor:pointer;
}

.theme{
position:absolute;
top:20px;
right:20px;
width:42px;
height:42px;
border-radius:50%;
border:1px solid var(--border);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
background:none;
color:var(--text);
}

.hidden{
display:none;
}

.result{
font-family:'Poppins',sans-serif;
font-size:32px;
margin-bottom:20px;
}

.reading{
font-family:'Merriweather',serif;
}

</style>
</head>

<body>

<button class="theme" onclick="toggleTheme()" id="themeBtn">☼</button>

<div class="container">

<div id="login">

<h1>CYBER QUIZ</h1>

<input id="name" placeholder="Full Name">
<input id="id" placeholder="Student ID">

<button class="start" onclick="startQuiz()">START</button>

</div>

<div id="quiz" class="hidden">

<div class="score" id="score">Score: 0</div>

<div class="question" id="question"></div>

<div class="options" id="options"></div>

<div class="nav">
<button onclick="prev()">‹</button>
<button onclick="next()">›</button>
</div>

</div>

<div id="result" class="hidden">

<div class="result">Quiz Finished</div>

<div id="final"></div>

<button class="start" onclick="location.reload()">Restart</button>

</div>

</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3">
</audio>

<script>

const API="https://script.google.com/macros/s/AKfycbxcc3bjK6bn5Gs0WypwJlz0qGkD_tFWAusIVFTb4uajn9vyaV5Psilk_94j2baJexBt/exec"

let questions=[]
let index=0
let score=0
let user={}

function toggleTheme(){

if(document.body.getAttribute("data-theme")=="dark"){
document.body.removeAttribute("data-theme")
document.getElementById("themeBtn").innerText="☼"
}else{
document.body.setAttribute("data-theme","dark")
document.getElementById("themeBtn").innerText="☾"
}

}

async function startQuiz(){

user.name=document.getElementById("name").value
user.id=document.getElementById("id").value

if(!user.name||!user.id){
alert("Enter name and ID")
return
}

document.getElementById("music").play()

document.getElementById("login").classList.add("hidden")
document.getElementById("quiz").classList.remove("hidden")

const res=await fetch(API)
questions=await res.json()

render()

}

function typeWriter(text){

const el=document.getElementById("question")
el.innerHTML=""
let i=0

function type(){

if(i<text.length){
el.innerHTML+=text.charAt(i)
i++
setTimeout(type,25)
}

}

type()

}

function render(){

const q=questions[index]

typeWriter("> "+q.Question)

const opts=[q.Option1,q.Option2,q.Option3,q.Option4]

const container=document.getElementById("options")

container.innerHTML=""

opts.forEach(o=>{

const btn=document.createElement("button")

btn.className="option"

btn.innerText=o

btn.onclick=()=>answer(o)

container.appendChild(btn)

})

}

function answer(a){

if(a===questions[index].Answer){
score++
document.getElementById("score").innerText="Score: "+score
}

next()

}

function next(){

if(index<questions.length-1){
index++
render()
}else{
finish()
}

}

function prev(){

if(index>0){
index--
render()
}

}

function finish(){

document.getElementById("quiz").classList.add("hidden")
document.getElementById("result").classList.remove("hidden")

const percent=((score/questions.length)*100).toFixed(1)

document.getElementById("final").innerText=score+" / "+questions.length+"  ("+percent+"%)"

fetch(API,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
name:user.name,
id:user.id,
score:score,
total:questions.length,
percentage:percent
})
})

}

</script>

</body>
</html>
